<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papa mozhet — Колесо Фортуны</title>
    <style>
        /* Подключение кастомного шрифта */
        @font-face {
            font-family: 'PapaCustomFont';
            src: url('papa-font.ttf') format('truetype');
            font-weight: bold;
            font-style: normal;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #141414 0%, #070708 100%);
            color: #f5f6fa;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .page-container {
            max-width: 1000px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-family: 'PapaCustomFont', -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 38px;
            font-weight: 800; /* Жирный шрифт */
            margin-bottom: 35px;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.4); /* Небольшая тень текста */
        }

        /* --- ОСНОВНОЙ ИНТЕРФЕЙС --- */
        .main-layout {
            display: flex;
            flex-direction: row;
            gap: 50px;
            background: #1e1e24;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            width: 100%;
            justify-content: center;
            align-items: center;
        }

        @media (max-width: 850px) {
            .main-layout {
                flex-direction: column;
                align-items: center;
                gap: 40px;
            }
        }

        .wheel-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
        }

        .wheel-arrow {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 30px solid #ff4757;
            z-index: 10;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4));
        }

        canvas {
            border-radius: 50%;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            cursor: pointer;
        }

        .controls-container {
            flex: 1;
            min-width: 340px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-title {
            font-size: 14px;
            font-weight: 700;
            color: #7f8c8d;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .sound-toggle {
            background: #2a2a32;
            border: 1px solid #3a3a42;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        textarea {
            width: 100%;
            height: 250px;
            padding: 18px;
            border: 2px solid #3a3a42;
            border-radius: 16px;
            resize: none;
            font-size: 16px;
            line-height: 1.6;
            color: #ffffff;
            outline: none;
            background-color: #141418;
        }

        .spin-button {
            background: linear-gradient(135deg, #ff4757 0%, #ff6b81 100%);
            color: white;
            border: none;
            padding: 18px;
            font-size: 22px;
            font-weight: 800;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(255, 71, 87, 0.35);
            letter-spacing: 1px;
        }

        .result-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 12, 0.8);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .result-card {
            background: #1e1e24;
            padding: 35px;
            border-radius: 28px;
            text-align: center;
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
            max-width: 460px;
            width: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .result-text {
            font-size: 38px;
            font-weight: 900;
            color: #ffffff;
            margin-bottom: 20px;
            text-shadow: 1.5px 1.5px 4px rgba(0, 0, 0, 0.6);
        }

        .result-gif {
            width: 100%;
            max-width: 260px;
            height: auto;
            border-radius: 14px;
            margin-bottom: 25px;
        }

        .actions-row {
            display: flex;
            gap: 14px;
            width: 100%;
        }

        .btn-action {
            flex: 1;
            padding: 16px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            border: none;
        }

        .btn-close {
            background: #3a3a42;
            color: #ffffff;
        }

        .btn-remove {
            background: linear-gradient(135deg, #ff4757 0%, #ee5253 100%);
            color: white;
        }
    </style>
</head>
<body>

    <div class="page-container">
        <h1>Papa mozhet</h1>

        <div class="main-layout">
            <div class="wheel-container">
                <div class="wheel-arrow"></div>
                <canvas id="wheelCanvas" width="460" height="460"></canvas>
            </div>

            <div class="controls-container">
                <div class="panel-header">
                    <div class="panel-title">Варианты (по одному на строку)</div>
                    <button class="sound-toggle" id="muteBtn" title="Включить/Выключить звук">🔊</button>
                </div>
                <textarea id="textInput">Я
Ты</textarea>

                <button class="spin-button" id="spinAction">КРУТИТЬ</button>
            </div>
        </div>
    </div>

    <div class="result-overlay" id="resultOverlay">
        <div class="result-card">
            <div class="result-text" id="resultName">Поздравляем!</div>
            <img class="result-gif" id="resultGif" src="dance-dancing.gif" alt="Танцующий мопсик">
            <div class="actions-row">
                <button class="btn-action btn-close" onclick="closePopup()">Готово</button>
                <button class="btn-action btn-remove" id="removeOptionBtn">Удалить</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const textInput = document.getElementById('textInput');
        const spinAction = document.getElementById('spinAction');
        const muteBtn = document.getElementById('muteBtn');
        const resultOverlay = document.getElementById('resultOverlay');
        const resultName = document.getElementById('resultName');
        const removeOptionBtn = document.getElementById('removeOptionBtn');
        const resultGif = document.getElementById('resultGif');

        let options = [];
        let currentAngle = 0;
        let isSpinning = false;
        let lastSegmentIndex = -1;
        let isMuted = false;
        let lastWinner = "";

        const SPIN_DURATION = 5000; 
        let spinStart = 0;
        let startAngle = 0;
        let totalRotationAngle = 0;

        const WIN_SOUND_URL = 'lucky-dance.mp3'; 
        const winAudio = new Audio(WIN_SOUND_URL);

        const colorPalette = [
            '#ff4500', '#ff8700', '#ffd300', '#deff0a', '#a1ff0a', '#0aff99',
            '#0aefff', '#147df5', '#580aff', '#be0aff', '#ff0aae', '#ff0a3e'
        ];

        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playTickSound() {
            if (isMuted) return;
            initAudio();
            if (!audioCtx) return;

            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(650, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(120, audioCtx.currentTime + 0.03);
            
            gainNode.gain.setValueAtTime(0.12, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.03);
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.03);
        }

        function playCustomWinSound() {
            if (isMuted) return;
            winAudio.currentTime = 0; 
            winAudio.volume = 0.3; 
            winAudio.play().catch(e => console.log(e));
        }

        function stopCustomWinSound() {
            winAudio.pause();
            winAudio.currentTime = 0;
        }

        function parseOptions() {
            options = textInput.value.split('\n')
                .map(line => line.trim())
                .filter(line => line.length > 0);
            
            drawWheel();
        }

        function drawWheel() {
            const size = canvas.width;
            const center = size / 2;
            const radius = center - 10;
            
            ctx.clearRect(0, 0, size, size);
            
            if (options.length === 0) {
                ctx.fillStyle = '#2a2a32';
                ctx.beginPath();
                ctx.arc(center, center, radius, 0, 2 * Math.PI);
                ctx.fill();
                return;
            }
            
            const sliceAngle = (2 * Math.PI) / options.length;
            
            options.forEach((text, i) => {
                const startAnglePos = currentAngle + i * sliceAngle;
                const endAnglePos = startAnglePos + sliceAngle;
                
                ctx.fillStyle = colorPalette[i % colorPalette.length];
                ctx.beginPath();
                ctx.moveTo(center, center);
                ctx.arc(center, center, radius, startAnglePos, endAnglePos);
                ctx.closePath();
                ctx.fill();
                
                ctx.strokeStyle = '#1e1e24';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                ctx.save();
                ctx.translate(center, center);
                ctx.rotate(startAnglePos + sliceAngle / 2);
                ctx.textAlign = 'right';
                ctx.fillStyle = '#ffffff';
                
                ctx.font = 'bold 20px -apple-system, BlinkMacSystemFont, sans-serif';
                ctx.shadowColor = 'rgba(0, 0, 0, 0.6)';
                ctx.shadowBlur = 4;
                ctx.shadowOffsetX = 1.5;
                ctx.shadowOffsetY = 1.5;
                
                const maxTextWidth = radius - 50;
                let renderText = text;
                if (ctx.measureText(renderText).width > maxTextWidth) {
                    while (ctx.measureText(renderText + '...').width > maxTextWidth && renderText.length > 0) {
                        renderText = renderText.slice(0, -1);
                    }
                    renderText += '...';
                }
                
                ctx.fillText(renderText, radius - 25, 6);
                ctx.restore();
            });
            
            ctx.fillStyle = '#1e1e24';
            ctx.beginPath();
            ctx.arc(center, center, 24, 0, 2 * Math.PI);
            ctx.fill();
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 4;
            ctx.stroke();
        }

        function getActiveSegmentIndex() {
            if (options.length === 0) return -1;
            const sliceAngle = (2 * Math.PI) / options.length;
            let relativeAngle = (Math.PI * 1.5 - currentAngle) % (2 * Math.PI);
            if (relativeAngle < 0) relativeAngle += 2 * Math.PI;
            return Math.floor(relativeAngle / sliceAngle) % options.length;
        }

        function startSpinning() {
            if (isSpinning || options.length === 0) return;
            initAudio();
            winAudio.load(); 
            
            isSpinning = true;
            spinStart = performance.now();
            startAngle = currentAngle;
            
            const fullTurns = (5 + Math.floor(Math.random() * 4)) * 2 * Math.PI;
            totalRotationAngle = fullTurns + Math.random() * 2 * Math.PI;

            lastSegmentIndex = getActiveSegmentIndex();
            animateWheel();
        }

        function animateWheel() {
            const now = performance.now();
            const elapsed = now - spinStart;
            
            if (elapsed < SPIN_DURATION) {
                let progress = elapsed / SPIN_DURATION;
                let easeOut = 1 - Math.pow(1 - progress, 3);
                
                currentAngle = startAngle + totalRotationAngle * easeOut;
                
                const currentSegment = getActiveSegmentIndex();
                if (currentSegment !== lastSegmentIndex) {
                    playTickSound();
                    lastSegmentIndex = currentSegment;
                }
                
                drawWheel();
                requestAnimationFrame(animateWheel);
            } else {
                currentAngle = startAngle + totalRotationAngle;
                isSpinning = false;
                drawWheel();
                showWinner();
            }
        }

        function showWinner() {
            const winnerIdx = getActiveSegmentIndex();
            if (winnerIdx === -1) return;
            
            lastWinner = options[winnerIdx];
            resultName.innerText = lastWinner;
            
            resultGif.src = "";
            resultGif.src = "dance-dancing.gif";
            
            resultOverlay.style.display = 'flex';
            playCustomWinSound(); 
        }

        function closePopup() {
            resultOverlay.style.display = 'none';
            stopCustomWinSound();
        }

        function removeLastWinner() {
            let lines = textInput.value.split('\n');
            const targetIdx = lines.findIndex(line => line.trim() === lastWinner);
            
            if (targetIdx !== -1) {
                lines.splice(targetIdx, 1);
                textInput.value = lines.join('\n');
                parseOptions();
            }
            closePopup();
        }

        muteBtn.addEventListener('click', () => {
            isMuted = !isMuted;
            muteBtn.innerText = isMuted ? '🔇' : '🔊';
            if (isMuted) stopCustomWinSound();
        });

        textInput.addEventListener('input', parseOptions);
        spinAction.addEventListener('click', startSpinning);
        canvas.addEventListener('click', startSpinning);
        removeOptionBtn.addEventListener('click', removeLastWinner);

        parseOptions();
    </script>
</body>
</html>
